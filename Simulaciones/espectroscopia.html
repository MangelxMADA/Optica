<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espectroscopía Óptica - Simulación Interactiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--card:rgba(15,23,42,0.85);--border:rgba(100,116,139,0.2);--text:#e2e8f0;--text2:#94a3b8;--accent:#818cf8;--accent2:#06b6d4;--radius:14px;--glow:0 0 30px rgba(99,102,241,0.15)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#818cf8,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin:1.2rem 0 .5rem}
h2{font-size:1.1rem;font-weight:600;color:var(--accent);margin:1rem 0 .5rem;display:flex;align-items:center;gap:.5rem}
h2::before{content:'';width:4px;height:1.1em;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:2px}
.app{max-width:1300px;margin:0 auto;padding:1rem}
.tabs{display:flex;gap:.5rem;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:.6rem 1.4rem;border:1px solid var(--border);background:var(--card);color:var(--text2);border-radius:99px;cursor:pointer;font-size:.85rem;font-weight:500;transition:all .3s}
.tab:hover,.tab.active{background:linear-gradient(135deg,rgba(99,102,241,0.3),rgba(6,182,212,0.2));color:#fff;border-color:var(--accent);box-shadow:var(--glow)}
.grid{display:grid;grid-template-columns:300px 1fr;gap:1rem;align-items:start}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--glow)}
.ctrl{display:flex;flex-direction:column;gap:.6rem}
label{font-size:.8rem;color:var(--text2);font-weight:500}
select,input[type=range]{width:100%;padding:.4rem;background:rgba(30,41,59,0.9);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none}
select:focus,input:focus{border-color:var(--accent)}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(99,102,241,0.5);cursor:pointer}
.val{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);text-align:right}
canvas{width:100%;border-radius:var(--radius);display:block;background:#000}
.spectrum-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--text2);margin-top:4px;font-family:'JetBrains Mono',monospace}
.formula-box{background:rgba(15,23,42,0.95);border:1px solid var(--border);border-radius:10px;padding:1rem;margin:.5rem 0;text-align:center;font-size:.95rem}
.legend{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.5rem}
.legend-item{display:flex;align-items:center;gap:.3rem;font-size:.72rem;color:var(--text2)}
.legend-color{width:12px;height:12px;border-radius:3px}
.info{font-size:.78rem;color:var(--text2);line-height:1.5;margin-top:.5rem}
.subtitle{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:1rem}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:600;background:rgba(99,102,241,0.2);color:var(--accent);border:1px solid rgba(99,102,241,0.3)}
.wavelength-markers{position:relative;height:20px;margin-top:2px}
.wl-mark{position:absolute;font-size:.6rem;color:#fff;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;text-shadow:0 0 4px rgba(0,0,0,0.8)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app" id="app">
<h1>🔬 Espectroscopía Óptica</h1>
<p class="subtitle">Simulación interactiva de espectros de emisión y absorción</p>
<div class="tabs">
<div class="tab active" onclick="switchMode('emission')">☀️ Espectro de Emisión</div>
<div class="tab" onclick="switchMode('absorption')">🌑 Espectro de Absorción</div>
</div>
<div class="grid">
<div class="card ctrl" id="controls">
<h2>Controles</h2>
<label>Elemento químico</label>
<select id="element" onchange="update()">
<option value="H">Hidrógeno (H)</option>
<option value="He">Helio (He)</option>
<option value="Na">Sodio (Na)</option>
<option value="Ne">Neón (Ne)</option>
<option value="Hg">Mercurio (Hg)</option>
<option value="Fe">Hierro (Fe)</option>
</select>
<label>Intensidad de brillo</label>
<input type="range" id="brightness" min="0.3" max="1" step="0.05" value="0.8" oninput="update()">
<div class="val" id="brightnessVal">0.80</div>
<label>Ancho de líneas (nm)</label>
<input type="range" id="lineWidth" min="1" max="12" step="0.5" value="3" oninput="update()">
<div class="val" id="lineWidthVal">3.0 nm</div>
<label>Temperatura (K)</label>
<input type="range" id="temperature" min="1000" max="30000" step="500" value="5500" oninput="update()">
<div class="val" id="tempVal">5500 K</div>
<div class="info" id="modeDesc"></div>
</div>
<div style="display:flex;flex-direction:column;gap:1rem">
<div class="card">
<h2 id="spectrumTitle">Espectro de Emisión</h2>
<canvas id="prismCanvas" height="180"></canvas>
<p class="info" style="margin-top:.5rem;text-align:center" id="prismDesc"></p>
</div>
<div class="card">
<h2>Espectro Resultante</h2>
<canvas id="spectrumCanvas" height="120"></canvas>
<div class="spectrum-label"><span>380 nm (UV)</span><span>550 nm</span><span>780 nm (IR)</span></div>
<div class="wavelength-markers" id="wlMarkers"></div>
<div class="legend" id="legend"></div>
</div>
<div class="two-col">
<div class="card">
<h2>Fórmulas Fundamentales</h2>
<div class="formula-box" id="formula1"></div>
<div class="formula-box" id="formula2"></div>
<div class="formula-box" id="formula3"></div>
</div>
<div class="card">
<h2>Líneas Espectrales</h2>
<div id="lineTable" style="font-size:.78rem;max-height:280px;overflow-y:auto"></div>
</div>
</div>
</div>
</div>
</div>
<script>
// ═══ DATOS ESPECTRALES DE ELEMENTOS ═══
const ELEMENTS = {
  H: { name:'Hidrógeno', Z:1, lines:[
    {wl:410.2,rel:0.4,series:'Balmer Hδ'},{wl:434.0,rel:0.5,series:'Balmer Hγ'},
    {wl:486.1,rel:0.7,series:'Balmer Hβ'},{wl:656.3,rel:1.0,series:'Balmer Hα'}
  ]},
  He: { name:'Helio', Z:2, lines:[
    {wl:388.9,rel:0.3,series:'3p→2s'},{wl:447.1,rel:0.4,series:'4d→2p'},
    {wl:471.3,rel:0.3,series:'4s→2p'},{wl:492.2,rel:0.5,series:'4d→2p'},
    {wl:501.6,rel:0.6,series:'3p→2s'},{wl:587.6,rel:1.0,series:'3d→2p'},
    {wl:667.8,rel:0.5,series:'3d→2p'},{wl:706.5,rel:0.4,series:'3s→2p'}
  ]},
  Na: { name:'Sodio', Z:11, lines:[
    {wl:449.4,rel:0.2,series:'5s→3p'},{wl:466.5,rel:0.15,series:'6s→3p'},
    {wl:498.3,rel:0.2,series:'5d→3p'},{wl:568.8,rel:0.4,series:'4d→3p'},
    {wl:589.0,rel:1.0,series:'D₁'},{wl:589.6,rel:0.95,series:'D₂'},
    {wl:616.1,rel:0.2,series:'5s→3p'},{wl:818.3,rel:0.3,series:'3d→3p'}
  ]},
  Ne: { name:'Neón', Z:10, lines:[
    {wl:540.1,rel:0.4,series:'2p→1s'},{wl:585.2,rel:0.5,series:'2p→1s'},
    {wl:614.3,rel:0.7,series:'2p→1s'},{wl:640.2,rel:0.8,series:'2p→1s'},
    {wl:650.6,rel:0.6,series:'2p→1s'},{wl:692.9,rel:0.5,series:'2p→1s'},
    {wl:703.2,rel:0.4,series:'2p→1s'},{wl:724.5,rel:0.3,series:'2p→1s'}
  ]},
  Hg: { name:'Mercurio', Z:80, lines:[
    {wl:404.7,rel:0.8,series:'7³S→6³P'},{wl:435.8,rel:0.9,series:'7³S→6³P'},
    {wl:491.6,rel:0.3,series:'8³S→6³P'},{wl:546.1,rel:1.0,series:'7³S→6³P'},
    {wl:577.0,rel:0.7,series:'6¹D→6¹P'},{wl:579.1,rel:0.65,series:'6¹D→6¹P'},
    {wl:623.4,rel:0.2,series:'6³D→6³P'},{wl:690.7,rel:0.15,series:'7³D→6³P'}
  ]},
  Fe: { name:'Hierro', Z:26, lines:[
    {wl:382.0,rel:0.5,series:'z⁵F→a⁵D'},{wl:404.6,rel:0.4,series:'z⁵D→a⁵D'},
    {wl:427.2,rel:0.6,series:'z⁵F→a⁵D'},{wl:438.4,rel:0.7,series:'z⁵D→a⁵D'},
    {wl:466.8,rel:0.5,series:'z⁵F→a⁵D'},{wl:489.1,rel:0.3,series:'z³F→a³F'},
    {wl:495.8,rel:0.4,series:'z⁵F→a⁵D'},{wl:516.7,rel:0.6,series:'z³D→a³D'},
    {wl:527.0,rel:0.8,series:'z⁵D→a⁵F'},{wl:532.8,rel:0.9,series:'y⁵D→a⁵D'},
    {wl:537.1,rel:0.5,series:'z³P→a³P'},{wl:561.6,rel:0.3,series:'z⁵F→b³F'},
    {wl:616.5,rel:0.4,series:'a³F→z³D'}
  ]}
};

let mode = 'emission';

// ═══ CONVERSIÓN LONGITUD DE ONDA → COLOR RGB ═══
function wlToRGB(wl, brightness=1) {
  let r=0,g=0,b=0;
  if(wl>=380&&wl<440){r=-(wl-440)/(440-380);b=1}
  else if(wl>=440&&wl<490){g=(wl-440)/(490-440);b=1}
  else if(wl>=490&&wl<510){g=1;b=-(wl-510)/(510-490)}
  else if(wl>=510&&wl<580){r=(wl-510)/(580-510);g=1}
  else if(wl>=580&&wl<645){r=1;g=-(wl-645)/(645-580)}
  else if(wl>=645&&wl<=780){r=1}
  let f=1;
  if(wl>=380&&wl<420)f=0.3+0.7*(wl-380)/(420-380);
  else if(wl>700&&wl<=780)f=0.3+0.7*(780-wl)/(780-700);
  return [Math.round(255*Math.pow(r*f*brightness,0.8)),
          Math.round(255*Math.pow(g*f*brightness,0.8)),
          Math.round(255*Math.pow(b*f*brightness,0.8))];
}

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&m==='emission')||(i===1&&m==='absorption'));
  });
  update();
}

// ═══ DIBUJAR PRISMA Y RAYOS ═══
function drawPrism(ctx, w, h, lines, bright) {
  ctx.clearRect(0,0,w,h);
  const px=w*0.42, py=h*0.5, ps=Math.min(w,h)*0.28;
  // Fondo degradado
  const bg=ctx.createLinearGradient(0,0,w,h);
  bg.addColorStop(0,'#080c18'); bg.addColorStop(1,'#0c1225');
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);

  if(mode==='emission') {
    // Fuente luminosa (tubo de descarga)
    const glow=ctx.createRadialGradient(w*0.08,h*0.5,2,w*0.08,h*0.5,40);
    glow.addColorStop(0,'rgba(255,255,220,0.9)');glow.addColorStop(1,'rgba(255,255,220,0)');
    ctx.fillStyle=glow;ctx.fillRect(0,0,w*0.2,h);
    ctx.fillStyle='rgba(200,200,255,0.15)';ctx.fillRect(w*0.03,h*0.38,w*0.08,h*0.24);
    ctx.strokeStyle='rgba(150,160,255,0.5)';ctx.lineWidth=1.5;ctx.strokeRect(w*0.03,h*0.38,w*0.08,h*0.24);
    ctx.fillStyle='rgba(200,220,255,0.7)';ctx.font='bold 10px Inter';ctx.textAlign='center';
    ctx.fillText('Tubo',w*0.07,h*0.35);
    // Rayo entrante (multicolor del gas)
    lines.forEach(l => {
      const [r,g,b]=wlToRGB(l.wl,bright*l.rel);
      ctx.strokeStyle=`rgba(${r},${g},${b},0.6)`;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(w*0.12,h*0.5);ctx.lineTo(px-ps*0.35,py);ctx.stroke();
    });
  } else {
    // Fuente de luz blanca
    const glow=ctx.createRadialGradient(w*0.08,h*0.5,4,w*0.08,h*0.5,35);
    glow.addColorStop(0,'rgba(255,255,240,0.95)');glow.addColorStop(1,'rgba(255,255,200,0)');
    ctx.fillStyle=glow;ctx.fillRect(0,0,w*0.2,h);
    ctx.fillStyle='rgba(255,250,230,0.8)';ctx.font='bold 10px Inter';ctx.textAlign='center';
    ctx.fillText('Luz blanca',w*0.08,h*0.33);
    // Rayo blanco entrante
    ctx.strokeStyle='rgba(255,255,240,0.7)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(w*0.12,h*0.5);
    // Celda de muestra
    const cx1=w*0.22,cx2=w*0.32;
    ctx.lineTo(cx1,h*0.5);ctx.stroke();
    ctx.fillStyle='rgba(100,140,255,0.12)';ctx.fillRect(cx1,h*0.34,cx2-cx1,h*0.32);
    ctx.strokeStyle='rgba(100,140,255,0.4)';ctx.lineWidth=1;ctx.strokeRect(cx1,h*0.34,cx2-cx1,h*0.32);
    ctx.fillStyle='rgba(150,180,255,0.7)';ctx.font='9px Inter';ctx.fillText('Muestra',w*0.27,h*0.31);
    ctx.strokeStyle='rgba(255,255,230,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx2,h*0.5);ctx.lineTo(px-ps*0.35,py);ctx.stroke();
  }

  // Prisma (triángulo con efecto glass)
  const ax=px,ay=py-ps*0.85,bx=px-ps*0.7,by=py+ps*0.55,cxx=px+ps*0.7,cy=py+ps*0.55;
  const pg=ctx.createLinearGradient(bx,by,cxx,ay);
  pg.addColorStop(0,'rgba(180,200,255,0.18)');pg.addColorStop(0.5,'rgba(220,230,255,0.12)');pg.addColorStop(1,'rgba(180,200,255,0.08)');
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.lineTo(cxx,cy);ctx.closePath();
  ctx.fillStyle=pg;ctx.fill();ctx.strokeStyle='rgba(200,210,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='rgba(200,220,255,0.6)';ctx.font='bold 11px Inter';ctx.textAlign='center';
  ctx.fillText('Prisma',px,py+5);

  // Rayos refractados
  const visLines=lines.filter(l=>l.wl>=380&&l.wl<=780);
  const exitX=cxx;
  visLines.forEach(l => {
    const frac=(l.wl-380)/(780-380);
    const angle=-0.35+frac*0.7;
    const [r,g,b]=wlToRGB(l.wl,bright*l.rel);
    const endX=w*0.95, endY=py+angle*(h*0.8);
    ctx.strokeStyle=`rgba(${r},${g},${b},${0.5+0.5*l.rel*bright})`;
    ctx.lineWidth=mode==='emission'?2:1.5;
    ctx.beginPath();ctx.moveTo(exitX,py);ctx.lineTo(endX,endY);ctx.stroke();
    // Punto brillante al final
    const dotG=ctx.createRadialGradient(endX,endY,0,endX,endY,4);
    dotG.addColorStop(0,`rgba(${r},${g},${b},0.9)`);dotG.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=dotG;ctx.beginPath();ctx.arc(endX,endY,4,0,Math.PI*2);ctx.fill();
  });

  // Pantalla de detección
  ctx.strokeStyle='rgba(200,210,255,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(w*0.94,h*0.05);ctx.lineTo(w*0.94,h*0.95);ctx.stroke();
  ctx.fillStyle='rgba(200,220,255,0.5)';ctx.font='9px Inter';ctx.save();
  ctx.translate(w*0.97,h*0.5);ctx.rotate(-Math.PI/2);ctx.fillText('Detector',0,0);ctx.restore();
}

// ═══ DIBUJAR ESPECTRO ═══
function drawSpectrum(ctx, w, h, lines, bright, lw) {
  ctx.clearRect(0,0,w,h);
  if(mode==='emission') {
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    lines.forEach(l => {
      if(l.wl<380||l.wl>780) return;
      const x=(l.wl-380)/(780-380)*w;
      const [r,g,b]=wlToRGB(l.wl,bright*l.rel);
      const hw=lw*w/400;
      const lg=ctx.createLinearGradient(x-hw,0,x+hw,0);
      lg.addColorStop(0,`rgba(${r},${g},${b},0)`);
      lg.addColorStop(0.3,`rgba(${r},${g},${b},${0.6*l.rel})`);
      lg.addColorStop(0.5,`rgba(${r},${g},${b},${l.rel*bright})`);
      lg.addColorStop(0.7,`rgba(${r},${g},${b},${0.6*l.rel})`);
      lg.addColorStop(1,`rgba(${r},${g},${b},0)`);
      ctx.fillStyle=lg;ctx.fillRect(x-hw,0,hw*2,h);
    });
  } else {
    // Espectro continuo
    for(let px=0;px<w;px++){
      const wl=380+(px/w)*400;
      const [r,g,b]=wlToRGB(wl,bright);
      ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(px,0,1,h);
    }
    // Líneas de absorción (oscuras)
    lines.forEach(l => {
      if(l.wl<380||l.wl>780) return;
      const x=(l.wl-380)/(780-380)*w;
      const hw=lw*w/400;
      const ag=ctx.createLinearGradient(x-hw,0,x+hw,0);
      ag.addColorStop(0,'rgba(0,0,0,0)');
      ag.addColorStop(0.3,`rgba(0,0,0,${0.5*l.rel})`);
      ag.addColorStop(0.5,`rgba(0,0,0,${0.85*l.rel})`);
      ag.addColorStop(0.7,`rgba(0,0,0,${0.5*l.rel})`);
      ag.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=ag;ctx.fillRect(x-hw,0,hw*2,h);
    });
  }
}

// ═══ ACTUALIZAR TODO ═══
function update() {
  const el=document.getElementById('element').value;
  const bright=parseFloat(document.getElementById('brightness').value);
  const lw=parseFloat(document.getElementById('lineWidth').value);
  const temp=parseInt(document.getElementById('temperature').value);
  const data=ELEMENTS[el];
  const lines=data.lines;

  document.getElementById('brightnessVal').textContent=bright.toFixed(2);
  document.getElementById('lineWidthVal').textContent=lw.toFixed(1)+' nm';
  document.getElementById('tempVal').textContent=temp+' K';

  document.getElementById('spectrumTitle').textContent=
    mode==='emission'?'Espectro de Emisión — '+data.name:'Espectro de Absorción — '+data.name;
  document.getElementById('modeDesc').innerHTML=mode==='emission'
    ?'<b>Emisión:</b> El gas excitado emite luz a longitudes de onda específicas. Al pasar por un prisma se separan en líneas brillantes sobre fondo oscuro.'
    :'<b>Absorción:</b> Luz blanca atraviesa el material, que absorbe ciertas longitudes de onda. El prisma revela líneas oscuras (Fraunhofer) sobre el espectro continuo.';
  document.getElementById('prismDesc').textContent=mode==='emission'
    ?'Gas excitado → Prisma → Líneas brillantes (espectro discreto)'
    :'Luz blanca → Muestra → Prisma → Espectro continuo con líneas oscuras';

  // Canvas Prisma
  const pc=document.getElementById('prismCanvas');
  pc.width=pc.parentElement.clientWidth-40;
  const pctx=pc.getContext('2d');
  drawPrism(pctx,pc.width,pc.height,lines,bright);

  // Canvas Espectro
  const sc=document.getElementById('spectrumCanvas');
  sc.width=sc.parentElement.clientWidth-40;
  const sctx=sc.getContext('2d');
  drawSpectrum(sctx,sc.width,sc.height,lines,bright,lw);

  // Marcadores de longitud de onda
  const mk=document.getElementById('wlMarkers');
  mk.innerHTML='';
  lines.forEach(l => {
    if(l.wl<380||l.wl>780) return;
    const pct=((l.wl-380)/400)*100;
    const [r,g,b]=wlToRGB(l.wl);
    const d=document.createElement('div');d.className='wl-mark';
    d.style.left=pct+'%';d.style.color=mode==='emission'?`rgb(${r},${g},${b})`:'#fff';
    d.textContent=l.wl+'nm';mk.appendChild(d);
  });

  // Leyenda
  const lg=document.getElementById('legend');
  lg.innerHTML='';
  lines.forEach(l => {
    if(l.wl<380||l.wl>780) return;
    const [r,g,b]=wlToRGB(l.wl);
    lg.innerHTML+=`<div class="legend-item"><div class="legend-color" style="background:rgb(${r},${g},${b})"></div>${l.wl} nm — ${l.series}</div>`;
  });

  // Tabla de líneas
  const tb=document.getElementById('lineTable');
  let html='<table style="width:100%;border-collapse:collapse">';
  html+='<tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:4px;color:var(--accent)">λ (nm)</th><th style="text-align:left;padding:4px;color:var(--accent)">Color</th><th style="text-align:left;padding:4px;color:var(--accent)">Serie</th><th style="text-align:right;padding:4px;color:var(--accent)">E (eV)</th></tr>';
  lines.forEach(l => {
    const [r,g,b]=wlToRGB(l.wl);
    const E=(1240/l.wl).toFixed(3);
    const cName=l.wl<450?'Violeta':l.wl<495?'Azul':l.wl<570?'Verde':l.wl<590?'Amarillo':l.wl<620?'Naranja':'Rojo';
    html+=`<tr style="border-bottom:1px solid var(--border)"><td style="padding:4px;font-family:'JetBrains Mono',monospace">${l.wl}</td><td style="padding:4px"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:rgb(${r},${g},${b});vertical-align:middle"></span> ${cName}</td><td style="padding:4px">${l.series}</td><td style="padding:4px;text-align:right;font-family:'JetBrains Mono',monospace">${E}</td></tr>`;
  });
  html+='</table>';
  tb.innerHTML=html;

  // Fórmulas
  renderFormulas(el,temp);
}

function renderFormulas(el,temp) {
  try{
    katex.render('\\frac{1}{\\lambda} = R_H \\left(\\frac{1}{n_1^2} - \\frac{1}{n_2^2}\\right), \\quad R_H = 1.097 \\times 10^7 \\; \\text{m}^{-1}',
      document.getElementById('formula1'),{displayMode:true,throwOnError:false});
    katex.render('E = h\\nu = \\frac{hc}{\\lambda}, \\quad h = 6.626 \\times 10^{-34} \\; \\text{J} \\cdot \\text{s}',
      document.getElementById('formula2'),{displayMode:true,throwOnError:false});
    katex.render('\\Delta E = E_2 - E_1 = -13.6 \\; \\text{eV} \\left(\\frac{1}{n_2^2} - \\frac{1}{n_1^2}\\right)',
      document.getElementById('formula3'),{displayMode:true,throwOnError:false});
  }catch(e){console.log('KaTeX error',e)}
}

window.addEventListener('resize', () => { update(); });
