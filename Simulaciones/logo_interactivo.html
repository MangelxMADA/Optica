<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Logo Interactivo - Óptica</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
  'use strict';
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0;
  let dpr = window.devicePixelRatio || 1;

  // State
  let time = 0;
  let currentY = 0;
  let targetY = 0;
  let isHovered = false;
  let theme = 'dark';

  function updateTheme() {
    try {
      theme = parent.document.documentElement.getAttribute('data-theme') || 'dark';
    } catch (e) {
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        theme = 'light';
      } else {
        theme = 'dark';
      }
    }
  }

  function resize() {
    const rect = canvas.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    
    // Scale for high-DPI screens
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.scale(dpr, dpr);
    
    if (currentY === 0) {
      currentY = H / 2;
      targetY = H / 2;
    }
  }

  window.addEventListener('resize', resize);

  // Mouse controls
  window.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    if (mx >= 0 && mx <= W && my >= 0 && my <= H) {
      isHovered = true;
      targetY = my;
    } else {
      isHovered = false;
    }
  });

  canvas.addEventListener('mouseleave', () => {
    isHovered = false;
  });

  // Math Helpers
  function intersectRaySegment(sx, sy, dx, dy, ax, ay, bx, by) {
    const vx = bx - ax;
    const vy = by - ay;
    const denominator = dx * vy - dy * vx;
    if (Math.abs(denominator) < 1e-8) return null;
    
    const t = ((ax - sx) * vy - (ay - sy) * vx) / denominator;
    const u = ((ax - sx) * dy - (ay - sy) * dx) / denominator;
    
    if (t >= 0 && u >= 0 && u <= 1) {
      return { x: sx + t * dx, y: sy + t * dy, t: t };
    }
    return null;
  }

  function getNormal(a, b, px, py, cx, cy) {
    const ex = b.x - a.x;
    const ey = b.y - a.y;
    let nx = -ey;
    let ny = ex;
    const len = Math.hypot(nx, ny);
    nx /= len;
    ny /= len;
    
    // Ensure normal points outwards from triangle center
    const vx = px - cx;
    const vy = py - cy;
    if (vx * nx + vy * ny < 0) {
      nx = -nx;
      ny = -ny;
    }
    return { x: nx, y: ny };
  }

  function refract(ix, iy, nx, ny, n1, n2) {
    const rIdx = n1 / n2;
    const c1 = -(nx * ix + ny * iy);
    const c2 = 1 - rIdx * rIdx * (1 - c1 * c1);
    if (c2 < 0) {
      // Total internal reflection (reflection)
      const rx = ix - 2 * (ix * nx + iy * ny) * nx;
      const ry = iy - 2 * (ix * nx + iy * ny) * ny;
      return { x: rx, y: ry, tir: true };
    }
    const tx = rIdx * ix + (rIdx * c1 - Math.sqrt(c2)) * nx;
    const ty = rIdx * iy + (rIdx * c1 - Math.sqrt(c2)) * ny;
    return { x: tx, y: ty, tir: false };
  }

  function draw() {
    time += 0.015;
    updateTheme();
    
    // Clear canvas
    ctx.clearRect(0, 0, W, H);
    
    // Smooth input tracking
    if (!isHovered) {
      // Gentle breathing idle animation
      targetY = H / 2 + Math.sin(time * 2) * (H * 0.22);
    }
    currentY += (targetY - currentY) * 0.15;
    
    // Define Prism Geometry (Centred equilateral triangle pointing upwards)
    const cx = W / 2;
    const cy = H / 2 + H * 0.05;
    const r = W * 0.28;
    const cos30 = 0.866025;
    const sin30 = 0.5;
    
    const v1 = { x: cx, y: cy - r };
    const v2 = { x: cx - r * cos30, y: cy + r * sin30 };
    const v3 = { x: cx + r * cos30, y: cy + r * sin30 };
    
    const edges = [
      { a: v2, b: v1 }, // Left edge (incoming)
      { a: v1, b: v3 }, // Right edge (outgoing)
      { a: v3, b: v2 }  // Bottom edge
    ];
    
    // 1. Ray Casting
    // Incident Ray Start
    const sx = 2;
    const sy = currentY;
    
    // Aim ray towards the middle of the left edge of the prism
    const targetPoint = { x: (v2.x + v1.x) / 2, y: (v2.y + v1.y) / 2 };
    let dx = targetPoint.x - sx;
    let dy = targetPoint.y - sy;
    const dlen = Math.hypot(dx, dy);
    dx /= dlen;
    dy /= dlen;
    
    // Trace 3 distinct rays for dispersion (Red, Green, Blue)
    // Blue refracts the most (high index), Red the least (low index)
    const rayConfigs = [
      { color: '#ff2c55', index: 1.42, label: 'Red' },   // Red
      { color: '#00e676', index: 1.54, label: 'Green' }, // Green
      { color: '#00d9ff', index: 1.68, label: 'Blue' }   // Blue
    ];
    
    // Draw the white incident beam (common path from source to prism hit point)
    // Find the first intersection with left edge of prism
    let incidentHit = null;
    let hitEdgeIndex = -1;
    for (let i = 0; i < 3; i++) {
      const inter = intersectRaySegment(sx, sy, dx, dy, edges[i].a.x, edges[i].a.y, edges[i].b.x, edges[i].b.y);
      if (inter && inter.t > 0.1) {
        if (!incidentHit || inter.t < incidentHit.t) {
          incidentHit = inter;
          hitEdgeIndex = i;
        }
      }
    }
    
    const hitPoint = incidentHit ? { x: incidentHit.x, y: incidentHit.y } : { x: sx + dx * 100, y: sy + dy * 100 };
    
    // Setup glow settings
    ctx.shadowBlur = 6;
    ctx.lineWidth = 1.8;
    
    if (theme === 'dark') {
      ctx.globalCompositeOperation = 'screen';
    } else {
      ctx.globalCompositeOperation = 'source-over';
    }
    
    // Draw dispersed paths
    rayConfigs.forEach(config => {
      ctx.strokeStyle = config.color;
      ctx.shadowColor = config.color;
      
      const path = [ { x: sx, y: sy } ];
      
      if (incidentHit) {
        path.push(hitPoint);
        
        // 1st Refraction (Air -> Glass)
        const norm1 = getNormal(edges[hitEdgeIndex].a, edges[hitEdgeIndex].b, hitPoint.x, hitPoint.y, cx, cy);
        const refr1 = refract(dx, dy, norm1.x, norm1.y, 1.0, config.index);
        
        // Find intersection of inner ray with other edges
        let exitHit = null;
        let exitEdgeIdx = -1;
        for (let i = 0; i < 3; i++) {
          const inter = intersectRaySegment(hitPoint.x, hitPoint.y, refr1.x, refr1.y, edges[i].a.x, edges[i].a.y, edges[i].b.x, edges[i].b.y);
          if (inter && inter.t > 0.2) {
            if (!exitHit || inter.t < exitHit.t) {
              exitHit = inter;
              exitEdgeIdx = i;
            }
          }
        }
        
        if (exitHit) {
          const ep = { x: exitHit.x, y: exitHit.y };
          path.push(ep);
          
          // 2nd Refraction (Glass -> Air)
          const norm2 = getNormal(edges[exitEdgeIdx].a, edges[exitEdgeIdx].b, ep.x, ep.y, cx, cy);
          const refr2 = refract(refr1.x, refr1.y, norm2.x, norm2.y, config.index, 1.0);
          
          // Final segment out to screen bounds
          path.push({ x: ep.x + refr2.x * 120, y: ep.y + refr2.y * 120 });
        } else {
          path.push({ x: hitPoint.x + refr1.x * 120, y: hitPoint.y + refr1.y * 120 });
        }
      } else {
        path.push(hitPoint);
      }
      
      // Draw this ray path inside & outside the prism
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) {
        ctx.lineTo(path[i].x, path[i].y);
      }
      ctx.stroke();
    });
    
    // Draw the white incident ray on top to show complete beam mixing
    ctx.strokeStyle = theme === 'dark' ? 'rgba(255, 255, 255, 0.95)' : 'rgba(100, 110, 130, 0.9)';
    ctx.shadowColor = theme === 'dark' ? 'rgba(255, 255, 255, 0.8)' : 'rgba(100, 110, 130, 0.4)';
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(hitPoint.x, hitPoint.y);
    ctx.stroke();
    
    // Reset composite operation to draw the prism structure
    ctx.globalCompositeOperation = 'source-over';
    ctx.shadowBlur = 0;
    
    // Draw Glass Prism
    ctx.beginPath();
    ctx.moveTo(v1.x, v1.y);
    ctx.lineTo(v2.x, v2.y);
    ctx.lineTo(v3.x, v3.y);
    ctx.closePath();
    
    // Glass gradient fill
    const grad = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
    if (theme === 'dark') {
      grad.addColorStop(0, 'rgba(0, 188, 212, 0.15)');
      grad.addColorStop(1, 'rgba(124, 77, 255, 0.03)');
      ctx.fillStyle = grad;
      ctx.strokeStyle = 'rgba(0, 188, 212, 0.55)';
    } else {
      grad.addColorStop(0, 'rgba(0, 151, 167, 0.12)');
      grad.addColorStop(1, 'rgba(92, 53, 201, 0.02)');
      ctx.fillStyle = grad;
      ctx.strokeStyle = 'rgba(0, 151, 167, 0.65)';
    }
    ctx.fill();
    
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    // Draw subtle glowing core inside the prism
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.35, 0, Math.PI * 2);
    if (theme === 'dark') {
      ctx.fillStyle = 'rgba(0, 188, 212, 0.05)';
    } else {
      ctx.fillStyle = 'rgba(0, 188, 212, 0.02)';
    }
    ctx.fill();

    requestAnimationFrame(draw);
  }

  // Init
  resize();
  draw();
</script>
</body>
</html>
