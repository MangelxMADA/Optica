<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ley de Snell - Simulación Interactiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--card:rgba(15,23,42,0.85);--border:rgba(100,116,139,0.2);--text:#e2e8f0;--text2:#94a3b8;--accent:#818cf8;--accent2:#06b6d4;--radius:14px;--glow:0 0 30px rgba(99,102,241,0.15)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#818cf8,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin:1.2rem 0 .5rem}
h2{font-size:1.05rem;font-weight:600;color:var(--accent);margin:1rem 0 .5rem;display:flex;align-items:center;gap:.5rem}
h2::before{content:'';width:4px;height:1.1em;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:2px}
.app{max-width:1300px;margin:0 auto;padding:1rem}
.grid{display:grid;grid-template-columns:280px 1fr;gap:1rem;align-items:start}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--glow)}
.ctrl{display:flex;flex-direction:column;gap:.55rem}
label{font-size:.8rem;color:var(--text2);font-weight:500}
select,input[type=range]{width:100%;padding:.4rem;background:rgba(30,41,59,0.9);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none}
select:focus{border-color:var(--accent)}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));padding:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(99,102,241,0.5);cursor:pointer}
.val{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--accent);text-align:right}
canvas{width:100%;border-radius:var(--radius);display:block;background:#000}
.formula-box{background:rgba(15,23,42,0.95);border:1px solid var(--border);border-radius:10px;padding:.8rem;margin:.4rem 0;text-align:center;overflow-x:auto}
.subtitle{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:1rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
.info{font-size:.78rem;color:var(--text2);line-height:1.5;margin-top:.5rem}
.data-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:.8rem}
.data-label{color:var(--text2)}.data-val{font-family:'JetBrains Mono',monospace;color:var(--accent)}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:600;margin:2px}
.badge-tir{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.badge-ok{background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px;margin:.4rem 0}
.mat-item{font-size:.72rem;padding:4px 6px;border-radius:6px;background:rgba(30,41,59,0.7);border:1px solid var(--border);text-align:center;cursor:pointer;transition:all .2s}
.mat-item:hover,.mat-item.sel{border-color:var(--accent);background:rgba(99,102,241,0.15)}
.mat-item .n{font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:600}
</style>
</head>
<body>
<div class="app">
<h1>🔦 Ley de Snell — Refracción de la Luz</h1>
<p class="subtitle">Simulación interactiva · Reflexión, refracción y reflexión total interna</p>
<div class="grid">
<div class="card ctrl" id="controls">
<h2>Controles</h2>
<label>Medio 1 (superior)</label>
<select id="mat1" onchange="update()"></select>
<label>Medio 2 (inferior)</label>
<select id="mat2" onchange="update()"></select>
<label>Ángulo de incidencia: <span class="val" id="angleVal">30°</span></label>
<input type="range" id="angle" min="0" max="89" step="0.5" value="30" oninput="update()">
<label>Longitud de onda: <span class="val" id="wlVal">550 nm</span></label>
<input type="range" id="wl" min="380" max="780" step="5" value="550" oninput="update()">
<div id="results"></div>
<div class="info" id="statusMsg"></div>
</div>
<div style="display:flex;flex-direction:column;gap:1rem">
<div class="card">
<h2>Diagrama de Refracción</h2>
<canvas id="mainCanvas" height="420"></canvas>
</div>
<div class="two-col">
<div class="card">
<h2>Fórmulas</h2>
<div class="formula-box" id="f1"></div>
<div class="formula-box" id="f2"></div>
<div class="formula-box" id="f3"></div>
<div class="formula-box" id="f4"></div>
</div>
<div class="card">
<h2>Tabla de Materiales</h2>
<div class="mat-grid" id="matGrid"></div>
<h2>Datos Calculados</h2>
<div id="calcData"></div>
</div>
</div>
</div>
</div>
</div>
<script>
const MATERIALS={
  'Vacío':{n:1.0000,color:'#1e293b',desc:'Espacio sin materia'},
  'Aire':{n:1.0003,color:'#e0f2fe',desc:'Gas atmosférico estándar'},
  'Agua':{n:1.333,color:'#0ea5e9',desc:'H₂O líquida a 20°C'},
  'Hielo':{n:1.309,color:'#bae6fd',desc:'H₂O sólida'},
  'Etanol':{n:1.361,color:'#d4fc79',desc:'Alcohol etílico'},
  'Glicerina':{n:1.473,color:'#fbbf24',desc:'Glicerol líquido'},
  'Vidrio Crown':{n:1.520,color:'#a5b4fc',desc:'Vidrio óptico común'},
  'Vidrio Flint':{n:1.620,color:'#818cf8',desc:'Vidrio óptico denso'},
  'Cuarzo':{n:1.544,color:'#c4b5fd',desc:'SiO₂ cristalino'},
  'Zafiro':{n:1.770,color:'#60a5fa',desc:'Al₂O₃ cristalino'},
  'Diamante':{n:2.417,color:'#f0abfc',desc:'Carbono cristalino'},
  'Acrílico':{n:1.490,color:'#67e8f9',desc:'PMMA / Plexiglás'},
  'Policarbonato':{n:1.585,color:'#a78bfa',desc:'Plástico óptico'},
  'Aceite':{n:1.470,color:'#fcd34d',desc:'Aceite de oliva'},
  'Sal (NaCl)':{n:1.544,color:'#fde68a',desc:'Cloruro de sodio'},
  'Circonia':{n:2.170,color:'#f472b6',desc:'ZrO₂ cúbico'},
  'Rutilo (TiO₂)':{n:2.614,color:'#fb923c',desc:'Dióxido de titanio'}
};

function populateSelects(){
  const s1=document.getElementById('mat1'),s2=document.getElementById('mat2');
  Object.keys(MATERIALS).forEach(k=>{
    s1.innerHTML+=`<option value="${k}" ${k==='Aire'?'selected':''}>${k} (n=${MATERIALS[k].n.toFixed(3)})</option>`;
    s2.innerHTML+=`<option value="${k}" ${k==='Vidrio Crown'?'selected':''}>${k} (n=${MATERIALS[k].n.toFixed(3)})</option>`;
  });
}

function populateMatGrid(){
  const g=document.getElementById('matGrid');
  Object.entries(MATERIALS).forEach(([k,v])=>{
    g.innerHTML+=`<div class="mat-item" onclick="selectMat('${k}')" title="${v.desc}"><div class="n">n=${v.n.toFixed(3)}</div>${k}</div>`;
  });
}

function selectMat(k){
  document.getElementById('mat2').value=k;update();
}

function wlToRGB(wl){
  let r=0,g=0,b=0;
  if(wl>=380&&wl<440){r=-(wl-440)/(440-380);b=1}
  else if(wl>=440&&wl<490){g=(wl-440)/(490-440);b=1}
  else if(wl>=490&&wl<510){g=1;b=-(wl-510)/(510-490)}
  else if(wl>=510&&wl<580){r=(wl-510)/(580-510);g=1}
  else if(wl>=580&&wl<645){r=1;g=-(wl-645)/(645-580)}
  else if(wl>=645&&wl<=780){r=1}
  let f=1;
  if(wl>=380&&wl<420)f=.3+.7*(wl-380)/40;
  else if(wl>700&&wl<=780)f=.3+.7*(780-wl)/80;
  return `rgb(${Math.round(255*(r*f)**.8)},${Math.round(255*(g*f)**.8)},${Math.round(255*(b*f)**.8)})`;
}

function deg(r){return r*180/Math.PI}
function rad(d){return d*Math.PI/180}

function update(){
  const m1=document.getElementById('mat1').value;
  const m2=document.getElementById('mat2').value;
  const theta1=parseFloat(document.getElementById('angle').value);
  const wl=parseInt(document.getElementById('wl').value);
  const n1=MATERIALS[m1].n, n2=MATERIALS[m2].n;

  document.getElementById('angleVal').textContent=theta1.toFixed(1)+'°';
  document.getElementById('wlVal').textContent=wl+' nm';

  const sinT2=(n1/n2)*Math.sin(rad(theta1));
  const hasTIR=sinT2>1;
  const critAngle=(n1>n2)?deg(Math.asin(n2/n1)):null;
  const theta2=hasTIR?null:deg(Math.asin(sinT2));

  // Fresnel coefficients (simplified for s-polarization)
  let Rs=0,Ts=1;
  if(!hasTIR){
    const c1=Math.cos(rad(theta1)),c2=Math.cos(rad(theta2));
    const rs=(n1*c1-n2*c2)/(n1*c1+n2*c2);
    Rs=rs*rs; Ts=1-Rs;
  }else{Rs=1;Ts=0}

  // Results panel
  const res=document.getElementById('results');
  let h='';
  h+=`<div class="data-row"><span class="data-label">n₁ (${m1})</span><span class="data-val">${n1.toFixed(4)}</span></div>`;
  h+=`<div class="data-row"><span class="data-label">n₂ (${m2})</span><span class="data-val">${n2.toFixed(4)}</span></div>`;
  h+=`<div class="data-row"><span class="data-label">θ₁ (incidencia)</span><span class="data-val">${theta1.toFixed(1)}°</span></div>`;
  if(!hasTIR) h+=`<div class="data-row"><span class="data-label">θ₂ (refracción)</span><span class="data-val">${theta2.toFixed(2)}°</span></div>`;
  if(critAngle!==null) h+=`<div class="data-row"><span class="data-label">θ_c (crítico)</span><span class="data-val">${critAngle.toFixed(2)}°</span></div>`;
  h+=`<div class="data-row"><span class="data-label">Reflectancia</span><span class="data-val">${(Rs*100).toFixed(1)}%</span></div>`;
  h+=`<div class="data-row"><span class="data-label">Transmitancia</span><span class="data-val">${(Ts*100).toFixed(1)}%</span></div>`;
  res.innerHTML=h;

  const msg=document.getElementById('statusMsg');
  if(hasTIR){
    msg.innerHTML='<span class="badge badge-tir">⚠ REFLEXIÓN TOTAL INTERNA</span><br>El ángulo supera el ángulo crítico. Toda la luz se refleja.';
  }else if(critAngle&&theta1>critAngle*0.9){
    msg.innerHTML='<span class="badge badge-tir">⚡ Cerca del ángulo crítico</span>';
  }else{
    msg.innerHTML='<span class="badge badge-ok">✓ Refracción normal</span>';
  }

  // Calc data
  const v1=3e8/n1, v2=3e8/n2;
  const wl1=wl/n1, wl2=wl/n2;
  const cd=document.getElementById('calcData');
  cd.innerHTML=`
    <div class="data-row"><span class="data-label">v₁</span><span class="data-val">${(v1/1e6).toFixed(1)} km/s</span></div>
    <div class="data-row"><span class="data-label">v₂</span><span class="data-val">${(v2/1e6).toFixed(1)} km/s</span></div>
    <div class="data-row"><span class="data-label">λ₁ en medio</span><span class="data-val">${wl1.toFixed(1)} nm</span></div>
    <div class="data-row"><span class="data-label">λ₂ en medio</span><span class="data-val">${wl2.toFixed(1)} nm</span></div>
    <div class="data-row"><span class="data-label">n₁·sin(θ₁)</span><span class="data-val">${(n1*Math.sin(rad(theta1))).toFixed(4)}</span></div>
    ${!hasTIR?`<div class="data-row"><span class="data-label">n₂·sin(θ₂)</span><span class="data-val">${(n2*Math.sin(rad(theta2))).toFixed(4)}</span></div>`:''}
  `;

  drawCanvas(n1,n2,theta1,theta2,hasTIR,critAngle,wl,m1,m2,Rs,Ts);
  renderFormulas();
}

function drawCanvas(n1,n2,t1,t2,tir,tc,wl,name1,name2,Rs,Ts){
  const c=document.getElementById('mainCanvas');
  c.width=c.parentElement.clientWidth-40;
  const W=c.width,H=c.height,ctx=c.getContext('2d');
  const midY=H*0.48, hitX=W*0.5;
  const rayColor=wlToRGB(wl);

  // Background
  const bg1=ctx.createLinearGradient(0,0,0,midY);
  bg1.addColorStop(0,'#0f172a');bg1.addColorStop(1,'#1e293b');
  ctx.fillStyle=bg1;ctx.fillRect(0,0,W,midY);

  const bg2=ctx.createLinearGradient(0,midY,0,H);
  const mc=MATERIALS[name2].color;
  bg2.addColorStop(0,mc+'33');bg2.addColorStop(1,mc+'11');
  ctx.fillStyle=bg2;ctx.fillRect(0,midY,W,H-midY);

  // Interface line
  ctx.strokeStyle='rgba(148,163,184,0.4)';ctx.lineWidth=2;ctx.setLineDash([8,4]);
  ctx.beginPath();ctx.moveTo(0,midY);ctx.lineTo(W,midY);ctx.stroke();ctx.setLineDash([]);

  // Normal (dashed)
  ctx.strokeStyle='rgba(148,163,184,0.25)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(hitX,midY-180);ctx.lineTo(hitX,midY+180);ctx.stroke();ctx.setLineDash([]);

  // Labels
  ctx.font='bold 13px Inter';ctx.fillStyle='rgba(255,255,255,0.6)';ctx.textAlign='left';
  ctx.fillText(name1+' (n₁='+n1.toFixed(3)+')',10,24);
  ctx.fillText(name2+' (n₂='+n2.toFixed(3)+')',10,midY+20);
  ctx.fillStyle='rgba(148,163,184,0.35)';ctx.font='11px Inter';ctx.textAlign='center';
  ctx.fillText('Normal',hitX+30,midY-165);

  const rayLen=Math.min(W*0.42,H*0.42);
  const t1r=rad(t1);

  // Incident ray
  const ix=hitX-rayLen*Math.sin(t1r), iy=midY-rayLen*Math.cos(t1r);
  ctx.strokeStyle=rayColor;ctx.lineWidth=3;ctx.globalAlpha=0.9;
  ctx.beginPath();ctx.moveTo(ix,iy);ctx.lineTo(hitX,midY);ctx.stroke();
  // Arrow
  drawArrow(ctx,ix,iy,hitX,midY,rayColor);

  // Reflected ray
  const reflAlpha=Math.max(0.15,Rs);
  const rx=hitX+rayLen*Math.sin(t1r)*0.8, ry=midY-rayLen*Math.cos(t1r)*0.8;
  ctx.globalAlpha=reflAlpha;ctx.strokeStyle=rayColor;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(hitX,midY);ctx.lineTo(rx,ry);ctx.stroke();
  drawArrow(ctx,hitX,midY,rx,ry,rayColor);
  ctx.globalAlpha=1;

  // Refracted ray
  if(!tir&&t2!==null){
    const t2r=rad(t2);
    const tx=hitX+rayLen*Math.sin(t2r)*0.85, ty=midY+rayLen*Math.cos(t2r)*0.85;
    ctx.globalAlpha=Ts;ctx.strokeStyle=rayColor;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(hitX,midY);ctx.lineTo(tx,ty);ctx.stroke();
    drawArrow(ctx,hitX,midY,tx,ty,rayColor);
    ctx.globalAlpha=1;
    // Angle arc θ₂
    ctx.strokeStyle='rgba(6,182,212,0.8)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(hitX,midY,45,Math.PI/2-t2r,Math.PI/2);ctx.stroke();
    ctx.fillStyle='#06b6d4';ctx.font='12px JetBrains Mono';ctx.textAlign='left';
    ctx.fillText('θ₂='+t2.toFixed(1)+'°',hitX+50,midY+45);
  }else if(tir){
    // TIR glow
    ctx.globalAlpha=0.3;
    const glow=ctx.createRadialGradient(hitX,midY,0,hitX,midY,60);
    glow.addColorStop(0,rayColor);glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(hitX,midY,60,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle='#f87171';ctx.font='bold 12px Inter';ctx.textAlign='center';
    ctx.fillText('Reflexión Total Interna',hitX,midY+50);
  }

  // Angle arc θi (Incidencia)
  ctx.strokeStyle='rgba(129,140,248,0.8)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(hitX,midY,45,-Math.PI/2-t1r,-Math.PI/2);ctx.stroke();
  ctx.fillStyle='#818cf8';ctx.font='12px JetBrains Mono';ctx.textAlign='right';
  ctx.fillText('θi='+t1.toFixed(1)+'°',hitX-50,midY-40);

  // Angle arc θr (Reflexión)
  ctx.strokeStyle='rgba(251,146,60,0.8)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(hitX,midY,50,-Math.PI/2,-Math.PI/2+t1r);ctx.stroke();
  ctx.fillStyle='#fb923c';ctx.font='12px JetBrains Mono';ctx.textAlign='left';
  ctx.fillText('θr='+t1.toFixed(1)+'°',hitX+55,midY-40);

  // Critical angle indicator
  if(tc!==null){
    const tcr=rad(tc);
    ctx.strokeStyle='rgba(251,191,36,0.3)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    const cx2=hitX+120*Math.sin(tcr),cy2=midY-120*Math.cos(tcr);
    ctx.beginPath();ctx.moveTo(hitX,midY);ctx.lineTo(cx2,cy2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(251,191,36,0.5)';ctx.font='10px Inter';
    ctx.fillText('θc='+tc.toFixed(1)+'°',cx2+5,cy2);
  }

  // Labels for rays
  ctx.font='11px Inter';ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('Rayo incidente',(ix+hitX)/2-30,(iy+midY)/2);
  ctx.fillText('Rayo reflejado',(rx+hitX)/2+30,(ry+midY)/2);
  if(!tir&&t2!==null){
    const t2r=rad(t2);
    const tx=hitX+rayLen*Math.sin(t2r)*0.85,ty=midY+rayLen*Math.cos(t2r)*0.85;
    ctx.fillText('Rayo refractado',(tx+hitX)/2+35,(ty+midY)/2);
  }

  // Hit point
  ctx.beginPath();ctx.arc(hitX,midY,5,0,Math.PI*2);
  ctx.fillStyle=rayColor;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.stroke();

  // Wavelength color indicator
  ctx.fillStyle=rayColor;
  ctx.fillRect(W-70,10,50,18);ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.strokeRect(W-70,10,50,18);
  ctx.fillStyle='#fff';ctx.font='9px JetBrains Mono';ctx.textAlign='center';
  ctx.fillText(wl+'nm',W-45,23);
}

function drawArrow(ctx,x1,y1,x2,y2,color){
  const a=Math.atan2(y2-y1,x2-x1);
  const mx=x1+(x2-x1)*0.6,my=y1+(y2-y1)*0.6;
  const sz=8;
  ctx.fillStyle=color;ctx.beginPath();
  ctx.moveTo(mx+sz*Math.cos(a),my+sz*Math.sin(a));
  ctx.lineTo(mx-sz*Math.cos(a-Math.PI/6),my-sz*Math.sin(a-Math.PI/6));
  ctx.lineTo(mx-sz*Math.cos(a+Math.PI/6),my-sz*Math.sin(a+Math.PI/6));
  ctx.closePath();ctx.fill();
}

function renderFormulas(){
  try{
    katex.render('n_1 \\sin\\theta_1 = n_2 \\sin\\theta_2',document.getElementById('f1'),{displayMode:true,throwOnError:false});
    katex.render('\\theta_2 = \\arcsin\\!\\left(\\frac{n_1}{n_2}\\sin\\theta_1\\right)',document.getElementById('f2'),{displayMode:true,throwOnError:false});
    katex.render('\\theta_c = \\arcsin\\!\\left(\\frac{n_2}{n_1}\\right), \\quad n_1 > n_2',document.getElementById('f3'),{displayMode:true,throwOnError:false});
    katex.render('n = \\frac{c}{v} = \\frac{\\lambda_0}{\\lambda_{\\text{medio}}}',document.getElementById('f4'),{displayMode:true,throwOnError:false});
  }catch(e){}
}

window.addEventListener('DOMContentLoaded',()=>{populateSelects();populateMatGrid();update()});
window.addEventListener('resize',update);
</script>
</body>
</html>
