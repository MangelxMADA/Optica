<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Difracción de la Luz - Simulación Interactiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--card:rgba(15,23,42,0.85);--border:rgba(100,116,139,0.2);--text:#e2e8f0;--text2:#94a3b8;--accent:#818cf8;--accent2:#06b6d4;--radius:14px;--glow:0 0 30px rgba(99,102,241,0.15)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#818cf8,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin:1.2rem 0 .5rem}
h2{font-size:1.05rem;font-weight:600;color:var(--accent);margin:1rem 0 .5rem;display:flex;align-items:center;gap:.5rem}
h2::before{content:'';width:4px;height:1.1em;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:2px}
.app{max-width:1350px;margin:0 auto;padding:1rem}
.grid{display:grid;grid-template-columns:290px 1fr;gap:1rem;align-items:start}
@media(max-width:850px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--glow)}
.ctrl{display:flex;flex-direction:column;gap:.55rem}
label{font-size:.8rem;color:var(--text2);font-weight:500}
select,input[type=range]{width:100%;padding:.4rem;background:rgba(30,41,59,0.9);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none}
select:focus{border-color:var(--accent)}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));padding:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(99,102,241,0.5);cursor:pointer}
.val{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--accent);text-align:right}
canvas{width:100%;border-radius:var(--radius);display:block;background:#000}
.formula-box{background:rgba(15,23,42,0.95);border:1px solid var(--border);border-radius:10px;padding:.8rem;margin:.4rem 0;text-align:center;overflow-x:auto}
.subtitle{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:1rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
.data-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:.8rem}
.data-label{color:var(--text2)}.data-val{font-family:'JetBrains Mono',monospace;color:var(--accent)}
.tab-bar{display:flex;gap:4px;margin-bottom:.8rem}
.tab-btn{flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:8px;background:rgba(30,41,59,0.6);color:var(--text2);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.tab-btn:hover{border-color:var(--accent);color:var(--text)}
.tab-btn.active{background:rgba(99,102,241,0.2);border-color:var(--accent);color:var(--accent)}
.color-strip{height:14px;border-radius:4px;margin:4px 0;background:linear-gradient(90deg,#8b00ff,#0000ff,#00ffff,#00ff00,#ffff00,#ff8800,#ff0000)}
.sep{border:none;border-top:1px solid var(--border);margin:.6rem 0}
</style>
</head>
<body>
<div class="app">
<h1>🌈 Difracción de la Luz</h1>
<p class="subtitle">Simulación interactiva · Ranura simple, doble y redes de difracción</p>
<div class="grid">
<div class="card ctrl" id="controls">
<h2>Modo</h2>
<div class="tab-bar" id="modeTabs">
<button class="tab-btn active" onclick="setMode(0)">1 Ranura</button>
<button class="tab-btn" onclick="setMode(1)">2 Ranuras</button>
<button class="tab-btn" onclick="setMode(2)">N Ranuras</button>
</div>
<h2>Parámetros</h2>
<label>Longitud de onda λ: <span class="val" id="wlVal">550 nm</span></label>
<input type="range" id="wl" min="380" max="780" step="5" value="550" oninput="update()">
<div class="color-strip"></div>
<label>Ancho de ranura a: <span class="val" id="aVal">5 µm</span></label>
<input type="range" id="slitA" min="1" max="50" step="0.5" value="5" oninput="update()">
<div id="dControl">
<label>Separación entre ranuras d: <span class="val" id="dVal">15 µm</span></label>
<input type="range" id="slitD" min="2" max="100" step="0.5" value="15" oninput="update()">
</div>
<div id="nControl" style="display:none">
<label>Número de ranuras N: <span class="val" id="nVal">4</span></label>
<input type="range" id="slitN" min="2" max="20" step="1" value="4" oninput="update()">
</div>
<label>Distancia a pantalla L: <span class="val" id="lVal">1.0 m</span></label>
<input type="range" id="screenL" min="0.1" max="5" step="0.1" value="1" oninput="update()">
<hr class="sep">
<h2>Resultados</h2>
<div id="results"></div>
</div>
<div style="display:flex;flex-direction:column;gap:1rem">
<div class="card">
<h2>Patrón de Difracción</h2>
<canvas id="patternCanvas" height="220"></canvas>
</div>
<div class="card">
<h2>Esquema Óptico</h2>
<canvas id="schemaCanvas" height="200"></canvas>
</div>
<div class="two-col">
<div class="card">
<h2>Fórmulas</h2>
<div id="formulas"></div>
</div>
<div class="card">
<h2>Datos Calculados</h2>
<div id="calcData"></div>
</div>
</div>
</div>
</div>
</div>
<script>
let MODE=0; // 0=single,1=double,2=grating

function setMode(m){
  MODE=m;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===m));
  document.getElementById('dControl').style.display=m>=1?'block':'none';
  document.getElementById('nControl').style.display=m===2?'block':'none';
  update();
}

function wlToRGB(wl){
  let r=0,g=0,b=0;
  if(wl>=380&&wl<440){r=-(wl-440)/(440-380);b=1}
  else if(wl>=440&&wl<490){g=(wl-440)/(490-440);b=1}
  else if(wl>=490&&wl<510){g=1;b=-(wl-510)/(510-490)}
  else if(wl>=510&&wl<580){r=(wl-510)/(580-510);g=1}
  else if(wl>=580&&wl<645){r=1;g=-(wl-645)/(645-580)}
  else if(wl>=645&&wl<=780){r=1}
  let f=1;
  if(wl>=380&&wl<420)f=.3+.7*(wl-380)/40;
  else if(wl>700&&wl<=780)f=.3+.7*(780-wl)/80;
  return [Math.round(255*(r*f)**.8),Math.round(255*(g*f)**.8),Math.round(255*(b*f)**.8)];
}

function sinc(x){return Math.abs(x)<1e-10?1:Math.sin(x)/x}

function intensity(theta,lambda,a,d,N){
  const k=2*Math.PI/lambda;
  const beta=k*a*Math.sin(theta)/2;
  const singleSlit=sinc(beta)**2;
  if(MODE===0) return singleSlit;
  const delta=k*d*Math.sin(theta)/2;
  if(MODE===1) return singleSlit*(Math.cos(delta)**2);
  // N slits
  let num=Math.sin(N*delta);
  let den=Math.sin(delta);
  let multi=Math.abs(den)<1e-12?N*N:(num/den)**2;
  return singleSlit*multi/(N*N);
}

function update(){
  const wl=+document.getElementById('wl').value;
  const a=+document.getElementById('slitA').value;
  const d=+document.getElementById('slitD').value;
  const N=+document.getElementById('slitN').value;
  const L=+document.getElementById('screenL').value;
  const lambda=wl*1e-9;
  const aM=a*1e-6;
  const dM=d*1e-6;

  document.getElementById('wlVal').textContent=wl+' nm';
  document.getElementById('aVal').textContent=a+' µm';
  document.getElementById('dVal').textContent=d+' µm';
  document.getElementById('nVal').textContent=N;
  document.getElementById('lVal').textContent=L.toFixed(1)+' m';

  drawPattern(lambda,aM,dM,N,L,wl);
  drawSchema(aM,dM,N,wl);
  showResults(lambda,aM,dM,N,L,wl);
  showFormulas();
  showCalcData(lambda,aM,dM,N,L,wl);
}

function drawPattern(lambda,a,d,N,L,wl){
  const c=document.getElementById('patternCanvas');
  c.width=c.parentElement.clientWidth-40;
  const W=c.width,H=c.height,ctx=c.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  const rgb=wlToRGB(wl);
  const maxAngle=Math.min(Math.asin(Math.min(3*lambda/a,0.99)),0.15);
  const nPts=W;
  const vals=[];
  for(let i=0;i<nPts;i++){
    const theta=maxAngle*(2*i/nPts-1);
    vals.push(intensity(theta,lambda,a,d,MODE===2?N:2));
  }

  // Draw color band (top 50px)
  const bandH=50;
  for(let i=0;i<nPts;i++){
    const I=vals[i];
    ctx.fillStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${I})`;
    ctx.fillRect(i,0,1,bandH);
  }

  // Draw white intensity overlay on band
  for(let i=0;i<nPts;i++){
    const I=vals[i];
    const bright=Math.floor(255*I);
    ctx.fillStyle=`rgba(${bright},${bright},${bright},${I*0.3})`;
    ctx.fillRect(i,0,1,bandH);
  }

  // Draw intensity curve
  const plotTop=bandH+10;
  const plotH=H-plotTop-20;
  ctx.strokeStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
  ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<nPts;i++){
    const x=i;
    const y=plotTop+plotH*(1-vals[i]);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Fill under curve
  ctx.lineTo(W,plotTop+plotH);ctx.lineTo(0,plotTop+plotH);ctx.closePath();
  const grd=ctx.createLinearGradient(0,plotTop,0,plotTop+plotH);
  grd.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.3)`);
  grd.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.02)`);
  ctx.fillStyle=grd;ctx.fill();

  // Axes labels
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='11px Inter';ctx.textAlign='center';
  ctx.fillText('θ (posición en pantalla)',W/2,H-4);
  ctx.save();ctx.translate(12,plotTop+plotH/2);ctx.rotate(-Math.PI/2);
  ctx.fillText('I/I₀',0,0);ctx.restore();

  // Center line
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.setLineDash([4,4]);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);

  // Mode label
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 12px Inter';ctx.textAlign='right';
  const labels=['Ranura Simple','Ranura Doble (Young)','Red de Difracción (N='+N+')'];
  ctx.fillText(labels[MODE],W-10,H-6);
}

function drawSchema(a,d,N,wl){
  const c=document.getElementById('schemaCanvas');
  c.width=c.parentElement.clientWidth-40;
  const W=c.width,H=c.height,ctx=c.getContext('2d');
  ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,W,H);

  const rgb=wlToRGB(wl);
  const rayColor=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;

  // Barrier position
  const bx=W*0.35;
  const screenX=W*0.85;
  const midY=H/2;

  // Draw incoming plane wave (left side)
  ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.3)`;
  ctx.lineWidth=1;
  for(let i=0;i<8;i++){
    const x=bx-30-i*20;
    ctx.beginPath();ctx.moveTo(x,20);ctx.lineTo(x,H-20);ctx.stroke();
  }
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px Inter';ctx.textAlign='center';
  ctx.fillText('Onda plana incidente',bx/2,18);

  // Draw barrier with slits
  const nSlits=MODE===0?1:(MODE===1?2:Math.min(N,10));
  const slitPxH=Math.max(4,Math.min(16,H/(nSlits*3)));
  const slitSpacing=Math.min(30,H/(nSlits+1));
  const totalH=(nSlits-1)*slitSpacing;
  const startY=midY-totalH/2;

  // Draw barrier (dark region)
  ctx.fillStyle='#334155';
  ctx.fillRect(bx-4,0,8,H);

  // Cut slits
  ctx.fillStyle='#0a0e1a';
  const slitPositions=[];
  for(let i=0;i<nSlits;i++){
    const sy=startY+i*slitSpacing;
    slitPositions.push(sy);
    ctx.clearRect(bx-4,sy-slitPxH/2,8,slitPxH);
    ctx.fillRect(bx-4,sy-slitPxH/2,8,slitPxH);
  }

  // Redraw barrier segments
  ctx.fillStyle='#475569';
  let prevEnd=0;
  for(let i=0;i<nSlits;i++){
    const sy=slitPositions[i]-slitPxH/2;
    ctx.fillStyle='#475569';ctx.fillRect(bx-4,prevEnd,8,sy-prevEnd);
    prevEnd=sy+slitPxH;
  }
  ctx.fillRect(bx-4,prevEnd,8,H-prevEnd);

  // Draw diffracted rays from each slit
  for(let i=0;i<nSlits;i++){
    const sy=slitPositions[i];
    const nRays=7;
    for(let r=0;r<nRays;r++){
      const angle=(r/(nRays-1)-0.5)*0.8;
      const ex=screenX;
      const ey=sy+(screenX-bx)*Math.tan(angle);
      if(ey<0||ey>H) continue;
      const alpha=0.12+0.15*Math.cos(angle*2)**2;
      ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`;
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(bx+4,sy);ctx.lineTo(ex,ey);ctx.stroke();
    }
  }

  // Draw screen
  ctx.fillStyle='rgba(148,163,184,0.3)';
  ctx.fillRect(screenX,10,3,H-20);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px Inter';ctx.textAlign='center';
  ctx.fillText('Pantalla',screenX,H-4);

  // Labels
  ctx.fillText('Barrera',bx,H-4);

  // Annotations
  if(nSlits>=2){
    const y1=slitPositions[0],y2=slitPositions[1];
    ctx.strokeStyle='rgba(6,182,212,0.6)';ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(bx+14,y1);ctx.lineTo(bx+14,y2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#06b6d4';ctx.font='bold 10px JetBrains Mono';
    ctx.fillText('d',bx+22,(y1+y2)/2);
  }
  // Slit width annotation
  if(slitPositions.length>0){
    const sy=slitPositions[0];
    ctx.strokeStyle='rgba(129,140,248,0.6)';ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(bx-12,sy-slitPxH/2);ctx.lineTo(bx-12,sy+slitPxH/2);
    ctx.stroke();
    ctx.fillStyle='#818cf8';ctx.font='bold 10px JetBrains Mono';ctx.textAlign='right';
    ctx.fillText('a',bx-16,sy+3);
  }
}

function showResults(lambda,a,d,N,L,wl){
  const res=document.getElementById('results');
  let h='';
  // First minimum position for single slit
  const y1min=L*lambda/a;
  h+=`<div class="data-row"><span class="data-label">1er mínimo (ranura)</span><span class="data-val">${(y1min*1e3).toFixed(2)} mm</span></div>`;

  if(MODE>=1){
    const yMax=L*lambda/d;
    h+=`<div class="data-row"><span class="data-label">Separación máximos</span><span class="data-val">${(yMax*1e3).toFixed(2)} mm</span></div>`;
    const mMax=Math.floor(d/lambda);
    h+=`<div class="data-row"><span class="data-label">Orden máximo m</span><span class="data-val">${mMax}</span></div>`;
  }
  if(MODE===2){
    const R=N;
    h+=`<div class="data-row"><span class="data-label">Poder resolvente</span><span class="data-val">R = ${R}·m</span></div>`;
    h+=`<div class="data-row"><span class="data-label">Máx. secundarios</span><span class="data-val">${N-2} entre principales</span></div>`;
  }
  const centralWidth=2*L*lambda/a;
  h+=`<div class="data-row"><span class="data-label">Ancho máx. central</span><span class="data-val">${(centralWidth*1e3).toFixed(2)} mm</span></div>`;
  res.innerHTML=h;
}

function showFormulas(){
  const box=document.getElementById('formulas');
  let html='';
  if(MODE===0){
    html+=`<div class="formula-box" id="f1"></div>`;
    html+=`<div class="formula-box" id="f2"></div>`;
    html+=`<div class="formula-box" id="f3"></div>`;
  }else if(MODE===1){
    html+=`<div class="formula-box" id="f1"></div>`;
    html+=`<div class="formula-box" id="f2"></div>`;
    html+=`<div class="formula-box" id="f3"></div>`;
    html+=`<div class="formula-box" id="f4"></div>`;
  }else{
    html+=`<div class="formula-box" id="f1"></div>`;
    html+=`<div class="formula-box" id="f2"></div>`;
    html+=`<div class="formula-box" id="f3"></div>`;
    html+=`<div class="formula-box" id="f4"></div>`;
    html+=`<div class="formula-box" id="f5"></div>`;
  }
  box.innerHTML=html;
  try{
    if(MODE===0){
      katex.render('I(\\theta)=I_0\\left[\\frac{\\sin\\beta}{\\beta}\\right]^2',document.getElementById('f1'),{displayMode:true,throwOnError:false});
      katex.render('\\beta=\\frac{\\pi\\,a\\,\\sin\\theta}{\\lambda}',document.getElementById('f2'),{displayMode:true,throwOnError:false});
      katex.render('a\\sin\\theta=m\\lambda \\quad (\\text{mínimos},\\;m=\\pm1,\\pm2,\\ldots)',document.getElementById('f3'),{displayMode:true,throwOnError:false});
    }else if(MODE===1){
      katex.render('I(\\theta)=I_0\\left[\\frac{\\sin\\beta}{\\beta}\\right]^2\\cos^2\\!\\delta',document.getElementById('f1'),{displayMode:true,throwOnError:false});
      katex.render('\\beta=\\frac{\\pi a\\sin\\theta}{\\lambda},\\quad \\delta=\\frac{\\pi d\\sin\\theta}{\\lambda}',document.getElementById('f2'),{displayMode:true,throwOnError:false});
      katex.render('d\\sin\\theta=m\\lambda \\quad (\\text{máximos},\\;m=0,\\pm1,\\pm2,\\ldots)',document.getElementById('f3'),{displayMode:true,throwOnError:false});
      katex.render('\\Delta y = \\frac{\\lambda L}{d}',document.getElementById('f4'),{displayMode:true,throwOnError:false});
    }else{
      katex.render('I(\\theta)=I_0\\left[\\frac{\\sin\\beta}{\\beta}\\right]^2\\!\\left[\\frac{\\sin(N\\delta)}{N\\sin\\delta}\\right]^2',document.getElementById('f1'),{displayMode:true,throwOnError:false});
      katex.render('\\beta=\\frac{\\pi a\\sin\\theta}{\\lambda},\\quad \\delta=\\frac{\\pi d\\sin\\theta}{\\lambda}',document.getElementById('f2'),{displayMode:true,throwOnError:false});
      katex.render('d\\sin\\theta=m\\lambda \\quad (\\text{máximos principales})',document.getElementById('f3'),{displayMode:true,throwOnError:false});
      katex.render('R = mN \\quad (\\text{poder resolvente})',document.getElementById('f4'),{displayMode:true,throwOnError:false});
      katex.render('N-2 \\;\\text{máximos secundarios entre principales}',document.getElementById('f5'),{displayMode:true,throwOnError:false});
    }
  }catch(e){}
}

function showCalcData(lambda,a,d,N,L,wl){
  const cd=document.getElementById('calcData');
  const freq=(3e8/lambda).toExponential(3);
  const energy=(6.626e-34*3e8/lambda/1.602e-19).toFixed(2);
  const k=(2*Math.PI/lambda).toExponential(3);
  let h='';
  h+=`<div class="data-row"><span class="data-label">λ</span><span class="data-val">${wl} nm</span></div>`;
  h+=`<div class="data-row"><span class="data-label">Frecuencia ν</span><span class="data-val">${freq} Hz</span></div>`;
  h+=`<div class="data-row"><span class="data-label">Energía fotón</span><span class="data-val">${energy} eV</span></div>`;
  h+=`<div class="data-row"><span class="data-label">Nº de onda k</span><span class="data-val">${k} m⁻¹</span></div>`;
  h+=`<div class="data-row"><span class="data-label">Ancho ranura a</span><span class="data-val">${(a*1e6).toFixed(1)} µm</span></div>`;
  if(MODE>=1){
    h+=`<div class="data-row"><span class="data-label">Separación d</span><span class="data-val">${(d*1e6).toFixed(1)} µm</span></div>`;
    h+=`<div class="data-row"><span class="data-label">Ratio d/a</span><span class="data-val">${(d/a).toFixed(2)}</span></div>`;
  }
  if(MODE===2){
    h+=`<div class="data-row"><span class="data-label">N ranuras</span><span class="data-val">${N}</span></div>`;
    h+=`<div class="data-row"><span class="data-label">Δλ mín (m=1)</span><span class="data-val">${(lambda*1e9/N).toFixed(2)} nm</span></div>`;
  }
  cd.innerHTML=h;
}

window.addEventListener('DOMContentLoaded',()=>{update()});
window.addEventListener('resize',update);
</script>
</body>
</html>
